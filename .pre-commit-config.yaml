repos:
- repo: local
  hooks:
    - id: mypy
      name: mypy
      entry: uv run mypy --follow-imports=silent
      language: system
      types: [python]
      pass_filenames: true

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    # Run the linter.
    - id: ruff-check
    # Run the formatter.
    - id: ruff-format
